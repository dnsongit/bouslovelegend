<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NOTRE HISTOIRE — Le Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#161327;
    --bg2:#221d3d;
    --panel:#2a2350;
    --pink:#ff4d8f;
    --pink-dim:#7a2a4c;
    --gold:#ffd166;
    --cyan:#4dd8ff;
    --cream:#f4ecd8;
    --wrong:#ff5c5c;
    --pixel:'Press Start 2P', monospace;
    --body:'VT323', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,77,143,0.08), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(77,216,255,0.08), transparent 40%),
      var(--bg);
    color:var(--cream);
    font-family:var(--body);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    position:relative;
    overflow:hidden;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.15) 0px,
      rgba(0,0,0,0.15) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events:none;
    z-index:50;
  }
  .cabinet{
    width:100%;
    max-width:520px;
    background:var(--panel);
    border:4px solid var(--cream);
    box-shadow: 0 0 0 4px var(--bg2), 8px 8px 0 rgba(0,0,0,0.5);
    border-radius:6px;
    padding:28px 24px 22px;
    position:relative;
    image-rendering:pixelated;
  }
  .screen-title{
    font-family:var(--pixel);
    font-size:11px;
    color:var(--gold);
    text-align:center;
    letter-spacing:1px;
    margin-bottom:6px;
  }
  h1{
    font-family:var(--pixel);
    font-size:20px;
    text-align:center;
    color:var(--pink);
    text-shadow:2px 2px 0 var(--bg2), 4px 4px 0 rgba(0,0,0,0.4);
    margin:0 0 18px;
    line-height:1.5;
  }
  .hearts{
    display:flex;
    justify-content:center;
    gap:6px;
    margin-bottom:18px;
  }
  .heart{
    width:18px;height:16px;
    position:relative;
  }
  .heart svg{width:100%;height:100%;display:block;}
  .score-row{
    display:flex;
    justify-content:space-between;
    font-family:var(--pixel);
    font-size:9px;
    color:var(--cyan);
    margin-bottom:14px;
  }
  .screen{display:none;}
  .screen.active{display:block;}

  #start .sprite{
    width:80px;height:80px;
    margin:0 auto 18px;
    display:block;
  }
  #start p{
    text-align:center;
    font-size:20px;
    color:var(--cream);
    margin-bottom:22px;
    line-height:1.4;
  }
  .btn{
    display:block;
    margin:0 auto;
    font-family:var(--pixel);
    font-size:12px;
    color:var(--bg);
    background:var(--gold);
    border:none;
    border-bottom:4px solid #b8912f;
    padding:14px 22px;
    cursor:pointer;
    border-radius:3px;
    letter-spacing:1px;
    animation:blink 1.4s infinite;
  }
  .btn:active{transform:translateY(3px); border-bottom-width:1px;}
  @keyframes blink{0%,49%{opacity:1;}50%,100%{opacity:0.55;}}

  .question-box{
    background:var(--bg2);
    border:2px solid var(--cyan);
    border-radius:4px;
    padding:16px 14px;
    margin-bottom:16px;
    min-height:70px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:22px;
    gap:10px;
  }
  .vinyl{
    width:46px;
    height:46px;
    display:none;
    animation:spin 2.2s linear infinite;
  }
  .vinyl.spinning{display:block;}
  @keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
  }
  .options{
    display:grid;
    gap:10px;
  }
  .opt{
    font-family:var(--body);
    font-size:19px;
    background:var(--bg);
    border:2px solid var(--pink-dim);
    color:var(--cream);
    padding:10px 14px;
    text-align:left;
    cursor:pointer;
    border-radius:3px;
    transition:transform .05s;
  }
  .opt:hover{border-color:var(--pink); background:#1e1a38;}
  .opt.correct{border-color:var(--gold); background:#3a3010; color:var(--gold);}
  .opt.wrong{border-color:var(--wrong); background:#3a1414; color:var(--wrong);}
  .opt[disabled]{cursor:default;}
  .funfact{
    margin-top:14px;
    font-size:18px;
    color:var(--gold);
    text-align:center;
    min-height:24px;
  }
  .next-btn{
    margin-top:16px;
  }
  .shake{animation:shake .35s;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-6px);}
    40%{transform:translateX(6px);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(4px);}
  }

  #end h2{
    font-family:var(--pixel);
    font-size:16px;
    text-align:center;
    color:var(--gold);
    margin-bottom:16px;
    line-height:1.6;
  }
  #end .msg{
    font-size:22px;
    text-align:center;
    line-height:1.5;
    color:var(--cream);
    background:var(--bg2);
    border:2px dashed var(--pink);
    padding:16px;
    border-radius:4px;
    margin-bottom:18px;
  }
  .confetti-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:40;
    overflow:hidden;
  }
  .pixel-heart{
    position:absolute;
    top:-20px;
    width:14px;height:12px;
    animation-name:fall;
    animation-timing-function:linear;
    animation-fill-mode:forwards;
  }
  @keyframes fall{
    to{ transform:translateY(110vh) rotate(360deg); opacity:0.9;}
  }
  @media (prefers-reduced-motion: reduce){
    .btn{animation:none;}
    .pixel-heart{animation:none; display:none;}
    .vinyl{animation:none;}
  }
</style>
</head>
<body>

<div class="cabinet">
  <div class="screen-title">◆ Bous Love Legend ◆</div>

  <!-- START SCREEN -->
  <div class="screen active" id="start">
    <h1>NOTRE<br>HISTOIRE</h1>
    <svg class="sprite" viewBox="0 0 16 16" shape-rendering="crispEdges">
      <rect x="4" y="0" width="8" height="2" fill="#ff4d8f"/>
      <rect x="2" y="2" width="12" height="2" fill="#ff4d8f"/>
      <rect x="0" y="4" width="16" height="6" fill="#ff4d8f"/>
      <rect x="2" y="10" width="12" height="2" fill="#ff4d8f"/>
      <rect x="4" y="12" width="8" height="2" fill="#ff4d8f"/>
      <rect x="6" y="14" width="4" height="2" fill="#ff4d8f"/>
      <rect x="5" y="6" width="2" height="2" fill="#ffd166"/>
      <rect x="9" y="6" width="2" height="2" fill="#ffd166"/>
    </svg>
    <p>Petit jeu mimi j'espère tu vas aimer !<br>Prête à jouer ?</p>
    <button class="btn" id="startBtn">▶ START</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="quiz">
    <div class="hearts" id="hearts"></div>
    <div class="score-row">
      <span id="qCount">Q 1/6</span>
      <span id="scoreCount">SCORE 0</span>
    </div>
    <div class="question-box">
      <span id="questionLabel"></span>
      <svg class="vinyl" id="vinyl" viewBox="0 0 46 46">
        <circle cx="23" cy="23" r="21" fill="#111" stroke="#4dd8ff" stroke-width="2"/>
        <circle cx="23" cy="23" r="14" fill="#221d3d"/>
        <circle cx="23" cy="23" r="8" fill="#111"/>
        <circle cx="23" cy="23" r="3" fill="#ffd166"/>
        <circle cx="23" cy="23" r="21" fill="none" stroke="#000" stroke-width="0.5" stroke-opacity="0.4"/>
        <circle cx="23" cy="23" r="18" fill="none" stroke="#000" stroke-width="0.5" stroke-opacity="0.3"/>
        <circle cx="23" cy="23" r="16" fill="none" stroke="#000" stroke-width="0.5" stroke-opacity="0.3"/>
      </svg>
    </div>
    <div class="options" id="options"></div>
    <div class="funfact" id="funfact"></div>
    <button class="btn next-btn" id="nextBtn" style="display:none;">SUIIIIITE ▶</button>
  </div>

  <!-- END SCREEN -->
  <div class="screen" id="end">
    <h2 id="endTitle">RÉSULTAT</h2>
    <div class="hearts" id="endHearts"></div>
    <div class="msg" id="finalMsg"></div>
    <button class="btn" id="replayBtn">↺ REJOUER</button>
  </div>
</div>

<div class="confetti-layer" id="confetti"></div>

<script>
/* =====================================================================
   PERSONNALISE ICI :
   - Modifie les questions, options, la bonne réponse (correct = index 0,1,2..)
   - "fact" = le petit mot / souvenir affiché après la réponse
   - "audio" = nom du fichier audio (dans le même dossier) joué à la révélation
   - Modifie aussi le message final tout en bas (FINAL_MESSAGE)
   ===================================================================== */
const QUESTIONS = [
  {
    q: "Quel est mon fruit préféré ?",
    options: ["Banane", "Pêche", "Abricot", "Ananas"],
    correct: 1,
    fact: "J'adore ta pêche omg met mon visage dedans wsh 🍑"
  },
  {
    q: "Le son qui nous représente trop ?",
    options: ["Senorita - JOSMAN", "BEBE BRINGUE - (D)Juno", "Hustleuse - H Jeune Crack", "Tchikita - JUL"],
    correct: 2,
    fact: "L'autre jour, j'ai retrouvé un calibre dans ses soutifsssss 🎵",
    audio: "hustleuse.mp3"
  },
  {
    q: "Ma partie préférée chez toi ?",
    options: ["Ton BBL", "Tes jolies gambettes", "Mais ça va pas de ou quoi wsh c'est quoi cette question ????", "La bonne réponse"],
    correct: 3,
    fact: "T'es crazy ou quoi tu penses je vais choisir une seule part alors que j'peux avoir tout le gâteau ? T'es la plus belle my love."
  },
  {
    q: "Le best date qu'on est fait ?",
    options: ["Acrobranche", "Boucan 😉", "Nos restau à Paname", "Le bar a Tapas à Barcelone"],
    correct: 0,
    fact: "Mais c'était tellement hilarant vraiment j'ai trop kiffe wsh"
  },
  {
    q: "Mon voyage de rêve avec toi ?",
    options: ["Amsterdam", "New York", "Viennes (Italie)", "Japon"],
    correct: 3,
    fact: "En vrai imagine Tokyo tous les deux ça serait pas INCROYABLE ?"
  },
  {
    q: "J'aimerai vivre avec quel animal de compagnie ?",
    options: ["Un chihuahua de merde qui crie", "Un shiba", "Un bon vieux chat tah garfield", "Un ptit singe."],
    correct: 3,
    fact: "C'est trop mimi pitié en plus ils aiment autant les noix de coco que j'aime les tiennes MOUAHAHAHHAHA"
  }
];

const FINAL_MESSAGE = "J'espère t'as un bon score hein pff mais bon ... Je t'aime 💗";

/* ===================================================================== */

let current = 0;
let score = 0;
let answered = false;
let currentPlayer = null;

const startScreen = document.getElementById('start');
const quizScreen = document.getElementById('quiz');
const endScreen = document.getElementById('end');

const heartsEl = document.getElementById('hearts');
const qCountEl = document.getElementById('qCount');
const scoreCountEl = document.getElementById('scoreCount');
const questionLabelEl = document.getElementById('questionLabel');
const vinylEl = document.getElementById('vinyl');
const optionsEl = document.getElementById('options');
const funfactEl = document.getElementById('funfact');
const nextBtn = document.getElementById('nextBtn');

const HEART_SVG = (filled) => `
  <svg viewBox="0 0 16 16" shape-rendering="crispEdges">
    <path fill="${filled ? '#ff4d8f' : '#3a3355'}" d="
      M2,2 h3 v2 h-1 v1 h1 v1 h-1 v1 h1 v1 h-1 v1 h-2 v-1 h-1 v-1 h1 v-1 h-1 v-1 h1 v-1 h-1 v-1 h1 v-1 z
    "/>
    <rect x="2" y="3" width="4" height="2" fill="${filled ? '#ff4d8f' : '#3a3355'}"/>
    <rect x="10" y="3" width="4" height="2" fill="${filled ? '#ff4d8f' : '#3a3355'}"/>
    <rect x="1" y="5" width="14" height="3" fill="${filled ? '#ff4d8f' : '#3a3355'}"/>
    <rect x="2" y="8" width="12" height="2" fill="${filled ? '#ff4d8f' : '#3a3355'}"/>
    <rect x="3" y="10" width="10" height="2" fill="${filled ? '#ff4d8f' : '#3a3355'}"/>
    <rect x="4" y="12" width="8" height="2" fill="${filled ? '#ff4d8f' : '#3a3355'}"/>
    <rect x="6" y="14" width="4" height="2" fill="${filled ? '#ff4d8f' : '#3a3355'}"/>
  </svg>`;

function renderHearts(container, filledCount, total){
  container.innerHTML = '';
  for(let i=0;i<total;i++){
    const d = document.createElement('div');
    d.className = 'heart';
    d.innerHTML = HEART_SVG(i < filledCount);
    container.appendChild(d);
  }
}

function stopVinyl(){
  vinylEl.classList.remove('spinning');
  if(currentPlayer){
    currentPlayer.pause();
    currentPlayer = null;
  }
}

function showQuestion(){
  answered = false;
  stopVinyl();
  const item = QUESTIONS[current];
  qCountEl.textContent = `Q ${current+1}/${QUESTIONS.length}`;
  scoreCountEl.textContent = `SCORE ${score}`;
  renderHearts(heartsEl, score, QUESTIONS.length);
  questionLabelEl.textContent = item.q;
  funfactEl.textContent = '';
  nextBtn.style.display = 'none';
  optionsEl.innerHTML = '';
  item.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt;
    btn.addEventListener('click', () => selectAnswer(idx, btn));
    optionsEl.appendChild(btn);
  });
}

function selectAnswer(idx, btnEl){
  if(answered) return;
  answered = true;
  const item = QUESTIONS[current];

  const allOpts = optionsEl.querySelectorAll('.opt');
  allOpts.forEach(o => o.setAttribute('disabled','true'));

  if(idx === item.correct){
    btnEl.classList.add('correct');
    score++;
    funfactEl.textContent = item.fact;
  } else {
    btnEl.classList.add('wrong');
    allOpts[item.correct].classList.add('correct');
    document.querySelector('.cabinet').classList.add('shake');
    setTimeout(()=>document.querySelector('.cabinet').classList.remove('shake'), 350);
    funfactEl.textContent = item.fact;
  }

  // Le son (et le vinyle qui tourne) se déclenchent ici, une fois la révélation affichée
  if(item.audio){
    currentPlayer = new Audio(item.audio);
    vinylEl.classList.add('spinning');
    currentPlayer.addEventListener('ended', () => {
      vinylEl.classList.remove('spinning');
    });
    currentPlayer.play().catch(() => {
      vinylEl.classList.remove('spinning');
      console.warn("Audio introuvable ou bloqué :", item.audio);
    });
  }

  scoreCountEl.textContent = `SCORE ${score}`;
  renderHearts(heartsEl, score, QUESTIONS.length);
  nextBtn.style.display = 'block';
}

nextBtn.addEventListener('click', () => {
  current++;
  if(current < QUESTIONS.length){
    showQuestion();
  } else {
    showEnd();
  }
});

function showEnd(){
  stopVinyl();
  quizScreen.classList.remove('active');
  endScreen.classList.add('active');
  const total = QUESTIONS.length;
  let title;
  if(score === total) title = "SCORE PARFAIT !";
  else if(score >= total/2) title = "PAS MAL DU TOUT !";
  else title = "ON A DU TRAVAIL 😄";
  document.getElementById('endTitle').textContent = `${title}\n${score} / ${total}`;
  renderHearts(document.getElementById('endHearts'), score, total);
  document.getElementById('finalMsg').textContent = FINAL_MESSAGE;
  launchConfetti();
}

function launchConfetti(){
  const layer = document.getElementById('confetti');
  layer.innerHTML = '';
  for(let i=0;i<24;i++){
    const h = document.createElement('div');
    h.className = 'pixel-heart';
    h.innerHTML = HEART_SVG(true);
    h.style.left = Math.random()*100 + 'vw';
    h.style.animationDuration = (2.5 + Math.random()*2) + 's';
    h.style.animationDelay = (Math.random()*1.5) + 's';
    layer.appendChild(h);
  }
}

document.getElementById('startBtn').addEventListener('click', () => {
  startScreen.classList.remove('active');
  quizScreen.classList.add('active');
  showQuestion();
});

document.getElementById('replayBtn').addEventListener('click', () => {
  current = 0; score = 0;
  stopVinyl();
  document.getElementById('confetti').innerHTML = '';
  endScreen.classList.remove('active');
  startScreen.classList.add('active');
});
</script>
</body>
</html>
